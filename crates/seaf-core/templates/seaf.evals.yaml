evals:
  allow_commands:
    - cargo test
    - pnpm typecheck
  required:
    - name: rust_tests
      command: cargo test -p seaf-core validate_eval_report --quiet
    - name: typecheck
      command: pnpm typecheck
thresholds:
  max_bundle_size_delta_percent: 5
  max_startup_time_delta_percent: 10
